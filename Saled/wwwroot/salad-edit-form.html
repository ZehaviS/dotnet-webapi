<!-- Edit Salad Form -->
<div id="editForm" style="display:none; margin-bottom: 20px;">
  <h3>Edit Salad</h3>
  <input id="edit-id" type="hidden">
  <label for="edit-name">Name:</label>
  <input id="edit-name" type="text"><br>
  <label for="edit-weight">Weight:</label>
  <input id="edit-weight" type="number" step="0.01"><br>
  <label for="edit-imageurl">Image URL:</label>
  <input id="edit-imageurl" type="text"><br>
  <button onclick="updateItem()">Save</button>
  <button onclick="closeInput()">Cancel</button>
</div>
