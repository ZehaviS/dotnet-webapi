<!DOCTYPE html>
<html>
<link rel="icon" href="path/to/favicon.ico" type="image/x-icon">

<head>
    <meta charset="UTF-8">
    <title>Salad </title>
    <link rel="stylesheet" href="css/site.css" />
</head>

<body>
    <h1>User </h1>

    <h3>Add</h3>

    <form action="javascript:void(0);" method="POST" onsubmit="addItem()">
        <input type="text" id="add-name" placeholder="New user name" >
        <input type="text" id="add-weight" placeholder="Weight" >
        <input type="submit" value="Add">
    </form>

    <div id="editForm" style="display:none;">
        <h3>Edit</h3>
        <input type="hidden" id="edit-id" name="edit-id">
        <input type="text" id="edit-weight" name="edit-weight" required placeholder="Weight">
        <input type="text" id="edit-name" name="edit-name" required placeholder="Name">
        <input type="text" id="edit-imageurl" name="edit-imageurl" placeholder="Image URL">
        <input type="button" value="Save" onclick="updateItem()">
        <a onclick="closeInput()" aria-label="Close">&#10006;</a>
    </div>

    <p id="counter"></p>

    <table>
        <tr>
            <th>id</th>
            <th>Name</th>
            <th></th>
            <th></th>
        </tr>
        <tbody id="saleds"></tbody>
    </table>

    <script src="js/site.js?v=9999" asp-append-version="true"></script>
    <script type="text/javascript">

      getItems();

        
    </script>
</body>

</html>
